<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BATTLESHIP</title>
  </head>
  <body>
    <header>
      <h1>Battleship</h1>
    </header>
    <main>
      <p id="status-message">Drag ships onto your board to begin.</p>

      <div id="game-area">
        <!-- Placement dock — hidden once game starts -->
        <div id="placement-section">
          <div id="ship-dock">
            <h3>YOUR FLEET</h3>
            <div id="dock-ships"></div>
            <button id="rotate-btn">↻ Horizontal</button>
          </div>
        </div>

        <!-- Boards -->
        <div id="boards">
          <div class="board-container">
            <h2>Your Board</h2>
            <div id="player-board" class="board"></div>
          </div>
          <div class="board-container hidden" id="enemy-section">
            <h2>Enemy Board</h2>
            <div id="enemy-board" class="board"></div>
          </div>
        </div>
      </div>

      <div id="btn-row">
        <button id="random-btn">↺ Random</button>
        <button id="start-btn" disabled>Start Game</button>
      </div>
    </main>
  </body>
</html>
